<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ItzMyVibe – Auto Sets</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #050514;
      --card: #0b0b1f;
      --accent: #8b5cff;
      --accent-soft: #3b2a80;
      --text: #ffffff;
      --muted: #a3a7d9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 14px 16px;
      background: #0b0b1f;
      border-bottom: 1px solid #26264a;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo {
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 12px 10px 20px;
    }

    /* Lista de shows */
    .list-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
      margin: 8px 0 10px;
    }

    .show-card {
      display: flex;
      gap: 10px;
      padding: 10px;
      border-radius: 10px;
      background: var(--card);
      border: 1px solid #26264a;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .show-cover {
      width: 70px;
      height: 70px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: #111;
    }
    .show-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .show-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .show-title {
      font-size: 13px;
      font-weight: 600;
    }
    .show-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Vista player */
    .player {
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      background: var(--card);
      border: 1px solid #26264a;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .player-top {
      display: flex;
      gap: 12px;
    }
    .player-cover {
      width: 110px;
      height: 110px;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
      background: #111;
    }
    .player-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .player-info {
      flex: 1;
    }
    .player-title {
      font-size: 15px;
      font-weight: 600;
    }
    .player-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .player-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .btn {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #26264a;
      background: #050514;
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
    }
    .btn-main {
      border-color: var(--accent);
      color: var(--accent);
    }

    audio {
      width: 100%;
      margin-top: 6px;
    }

    /* Waveform fake */
    .wave {
      height: 40px;
      border-radius: 6px;
      background: linear-gradient(
        to right,
        #26264a 0%,
        #8b5cff 30%,
        #ff7bff 60%,
        #26264a 100%
      );
      position: relative;
      overflow: hidden;
      margin-top: 8px;
    }
    .wave::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        to right,
        rgba(0,0,0,0.4) 0,
        rgba(0,0,0,0.4) 1px,
        transparent 1px,
        transparent 4px
      );
      animation: waveMove 8s linear infinite;
    }
    @keyframes waveMove {
      from { transform: translateX(0); }
      to { transform: translateX(-40px); }
    }

    /* Tracklist */
    .tracklist-box {
      margin-top: 10px;
    }
    .tracklist-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .tracklist-area {
      width: 100%;
      min-height: 80px;
      border-radius: 8px;
      border: 1px solid #26264a;
      background: #050514;
      color: var(--text);
      font-size: 12px;
      padding: 8px;
      resize: vertical;
    }

    @media (max-width: 640px) {
      .player-top {
        flex-direction: column;
      }
      .player-cover {
        width: 100%;
        height: 180px;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">ITZMYVIBE</div>
  <div class="subtitle">Auto shows · MP3 & AIFF · GitHub</div>
</header>

<div class="container">
  <div class="list-title">All shows</div>
  <div id="show-list"></div>

  <div id="player" class="player" style="display:none;">
    <div class="player-top">
      <div class="player-cover">
        <img id="player-cover" src="" alt="Cover">
      </div>
      <div class="player-info">
        <div class="player-title" id="player-title"></div>
        <div class="player-meta" id="player-meta"></div>
        <div class="player-actions">
          <button class="btn btn-main" onclick="togglePlay()">Play / Pause</button>
          <button class="btn" onclick="copyLink()">Copiar link</button>
        </div>
      </div>
    </div>

    <div class="wave"></div>

    <audio id="player-audio" controls>
      <source id="player-source" src="" type="audio/mpeg">
    </audio>

    <div class="tracklist-box">
      <div class="tracklist-label">Tracklist (pega aquí manualmente):</div>
      <textarea id="tracklist-area" class="tracklist-area" placeholder="01. Artista – Track&#10;02. Artista – Track&#10;..."></textarea>
    </div>
  </div>
</div>

<script>
  // 🔧 CONFIGURA SOLO ESTO:
  const GITHUB_USER = "rooy90";      // <-- tu usuario
  const GITHUB_REPO = "itzmyvibe";  // <-- tu repo
  const AUDIO_DIR = "audio";        // carpeta de audio en el repo
  const IMG_DIR = "img";            // carpeta de imágenes en el repo

  const showListEl = document.getElementById("show-list");
  const playerEl = document.getElementById("player");
  const playerTitleEl = document.getElementById("player-title");
  const playerMetaEl = document.getElementById("player-meta");
  const playerCoverEl = document.getElementById("player-cover");
  const playerAudioEl = document.getElementById("player-audio");
  const playerSourceEl = document.getElementById("player-source");
  const tracklistAreaEl = document.getElementById("tracklist-area");

  let currentShow = null;

  async function fetchShows() {
    const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${AUDIO_DIR}`;
    const res = await fetch(url);
    if (!res.ok) {
      showListEl.innerHTML = "<div style='font-size:12px;color:#f88;'>No se pudo leer la carpeta de audio.</div>";
      return;
    }
    const files = await res.json();
    const audioFiles = files.filter(f => {
      return f.type === "file" &&
        (f.name.toLowerCase().endsWith(".mp3") || f.name.toLowerCase().endsWith(".aiff"));
    });

    if (!audioFiles.length) {
      showListEl.innerHTML = "<div style='font-size:12px;color:#a3a7d9;'>No hay sets aún. Sube archivos a la carpeta 'audio'.</div>";
      return;
    }

    audioFiles.forEach(file => {
      const name = file.name;
      const base = name.replace(/\.(mp3|MP3|aiff|AIFF)$/,"");
      const displayName = base.replace(/[_\-]/g, " ");
      const coverUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${IMG_DIR}/${base}.jpg`;
      const audioUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${AUDIO_DIR}/${name}`;

      const card = document.createElement("div");
      card.className = "show-card";
      card.onclick = () => openPlayer({
        title: displayName,
        fileName: name,
        coverUrl,
        audioUrl
      });

      const cover = document.createElement("div");
      cover.className = "show-cover";
      const img = document.createElement("img");
      img.src = coverUrl;
      img.alt = base;
      cover.appendChild(img);

      const info = document.createElement("div");
      info.className = "show-info";
      const titleEl = document.createElement("div");
      titleEl.className = "show-title";
      titleEl.textContent = displayName;
      const metaEl = document.createElement("div");
      metaEl.className = "show-meta";
      metaEl.textContent = name.toLowerCase().endsWith(".mp3") ? "MP3 set" : "AIFF set";

      info.appendChild(titleEl);
      info.appendChild(metaEl);

      card.appendChild(cover);
      card.appendChild(info);
      showListEl.appendChild(card);
    });
  }

  function openPlayer(show) {
    currentShow = show;
    playerTitleEl.textContent = show.title;
    playerMetaEl.textContent = show.fileName;
    playerCoverEl.src = show.coverUrl;
    playerSourceEl.src = show.audioUrl;
    playerAudioEl.load();
    playerEl.style.display = "block";
    playerAudioEl.play().catch(()=>{});
    // tracklist se queda manual, no se borra al cambiar
  }

  function togglePlay() {
    if (!playerAudioEl.src) return;
    if (playerAudioEl.paused) {
      playerAudioEl.play();
    } else {
      playerAudioEl.pause();
    }
  }

  function copyLink() {
    if (!currentShow) return;
    const url = currentShow.audioUrl;
    navigator.clipboard.writeText(url).then(()=>{
      alert("Link copiado al portapapeles.");
    }).catch(()=>{
      alert("No se pudo copiar el link.");
    });
  }

  fetchShows();
</script>

</body>
</html>
