<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ItzMyVibe – Sets</title>
  <style>
    body {
      margin: 0;
      background: #0a0a12;
      font-family: Arial, sans-serif;
      color: #fff;
    }
    header {
      padding: 20px;
      background: #111;
      border-bottom: 1px solid #222;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 2px;
      color: #9f7fff;
    }
    .track {
      max-width: 900px;
      margin: 30px auto;
      background: #14141f;
      padding: 20px;
      border-radius: 10px;
      display: flex;
      gap: 20px;
    }
    .track img {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
    }
    .info {
      flex: 1;
    }
    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .meta {
      font-size: 12px;
      color: #bbb;
      margin-bottom: 10px;
    }
    audio {
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<header>ITZMYVIBE – DJ SETS</header>

<div class="track">
  <img src="img/set1.jpg" alt="Cover Set 1">
  <div class="info">
    <div class="title">Tribal Night Session</div>
    <div class="meta">120 min · Azul violeta vibe</div>
    <audio controls>
      <source src="audio/set1.mp3" type="audio/mpeg">
    </audio>
  </div>
</div>

<div class="track">
  <img src="img/set2.jpg" alt="Cover Set 2">
  <div class="info">
    <div class="title">Warehouse Tech House</div>
    <div class="meta">90 min · Deep & Groovy</div>
    <audio controls>
      <source src="audio/set2.mp3" type="audio/mpeg">
    </audio>
  </div>
</div>

</body>
</html>
